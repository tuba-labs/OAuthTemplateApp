<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Link email and password</title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/profile-actions.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{org/tubalabs/app/navigation/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <div th:replace="~{org/tubalabs/app/users/profile/profile-fragments :: profileMenu}"></div>
        <h1 class="page-title">Link email and password</h1>
    </div>
    <p class="page-subtitle">Add an email and password login to this account.</p>

    <form class="form"
          method="post"
          th:action="@{/profile/login-types/local/link}"
          th:object="${localLoginTypeForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field" th:if="${#fields.hasGlobalErrors()}">
            <span class="field-error" th:each="error : ${#fields.globalErrors()}" th:text="${error}">Could not link login type.</span>
        </div>
        <label class="field">
            <span>Email</span>
            <input th:field="*{email}" type="email" autocomplete="email" required maxlength="320">
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </label>
        <label class="field">
            <span>Password</span>
            <input th:field="*{password}" type="password" autocomplete="new-password" required>
            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </label>
        <label class="field">
            <span>Confirm password</span>
            <input th:field="*{passwordConfirmation}" type="password" autocomplete="new-password" required>
            <span class="field-error" th:if="${#fields.hasErrors('passwordConfirmation')}" th:errors="*{passwordConfirmation}"></span>
        </label>
        <div class="button-row">
            <a class="button button-secondary" th:href="@{/profile/login-types}">Back</a>
            <button class="button" type="submit">Link</button>
        </div>
    </form>

    <div th:replace="~{org/tubalabs/app/users/profile/profile-fragments :: confirmationDialog}"></div>
</section>
</main>
</body>
</html>
