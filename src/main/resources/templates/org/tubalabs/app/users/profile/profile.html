<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile</title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/profile-picture.js}"></script>
    <script th:src="@{/js/profile-password-dialog.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{org/tubalabs/app/navigation/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <details class="profile-menu">
            <summary class="profile-menu-toggle" aria-label="Profile actions">
                <span class="profile-menu-icon" aria-hidden="true"></span>
            </summary>
            <div class="profile-menu-panel">
                <button class="profile-menu-item"
                        th:if="${passwordChangeAvailable}"
                        type="button"
                        data-password-dialog-open>Change password</button>
                <form method="post"
                      action="/logout"
                      onsubmit="return confirm('Log out?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="profile-menu-item profile-menu-danger-item" type="submit">Logout</button>
                </form>
            </div>
        </details>
        <h1 class="page-title">Profile</h1>
    </div>
    <p class="page-subtitle">Manage the information shown for your account.</p>
    <p class="message message-success" th:if="${profileSaved}">Profile saved.</p>
    <p class="message message-success" th:if="${passwordSaved}">Password changed.</p>

    <form id="profileForm" class="form" method="post" action="/profile" enctype="multipart/form-data" th:object="${profileForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field" th:if="${localProfile}">
            <span>Login name</span>
            <output class="readonly-value" th:text="${localLoginName}">person@example.com</output>
        </div>

        <div class="profile-identity-field">
            <label class="profile-picture-field">
                <span class="visually-hidden">Profile picture</span>
                <span class="profile-picture-control" data-profile-picture-control>
                    <img class="profile-picture-image"
                         th:if="${profilePictureUrl}"
                         th:src="${profilePictureUrl}"
                         alt=""
                         data-profile-picture-preview>
                    <span class="profile-picture-placeholder"
                          th:unless="${profilePictureUrl}"
                          data-profile-picture-placeholder>Profile</span>
                    <input class="profile-picture-input"
                           name="pictureFile"
                           type="file"
                           accept="image/png,image/jpeg,image/gif"
                           data-profile-picture-input>
                </span>
                <span class="field-error" th:if="${#fields.hasErrors('pictureUrl')}" th:errors="*{pictureUrl}"></span>
            </label>
            <label class="field profile-display-name-field">
                <span>Display name</span>
                <input th:field="*{displayName}" autocomplete="name" required minlength="3" maxlength="20" aria-describedby="displayNameRequirements">
                <p class="field-help" id="displayNameRequirements">Use 3 to 20 characters.</p>
                <span class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></span>
            </label>
        </div>
    </form>

    <div class="profile-actions">
        <button class="button" type="submit" form="profileForm">Save profile</button>
    </div>

    <dialog class="profile-password-dialog"
            th:if="${passwordChangeAvailable}"
            th:attr="data-password-dialog-open=${passwordDialogOpen} ? 'true' : 'false'"
            data-password-dialog>
        <form class="dialog-close-form" method="dialog">
            <button class="text-link-button" type="submit">Close</button>
        </form>
        <h2 class="section-title">Change password</h2>
        <form class="form" method="post" action="/profile/password" th:object="${passwordForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label class="field">
                <span>Current password</span>
                <input name="currentPassword" type="password" autocomplete="current-password" required>
                <span class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
            </label>
            <label class="field">
                <span>New password</span>
                <input name="newPassword" type="password" autocomplete="new-password" required>
                <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
            </label>
            <label class="field">
                <span>Confirm new password</span>
                <input name="newPasswordConfirmation" type="password" autocomplete="new-password" required>
                <span class="field-error" th:if="${#fields.hasErrors('newPasswordConfirmation')}" th:errors="*{newPasswordConfirmation}"></span>
            </label>
            <button class="button" type="submit">Save password</button>
        </form>
    </dialog>
</section>
</main>
</body>
</html>
