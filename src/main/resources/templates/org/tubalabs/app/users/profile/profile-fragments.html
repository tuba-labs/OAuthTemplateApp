<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<details class="profile-menu" th:fragment="profileMenu">
    <summary class="profile-menu-toggle" aria-label="Profile actions">
        <span class="profile-menu-icon" aria-hidden="true"></span>
    </summary>
    <div class="profile-menu-panel">
        <a class="profile-menu-item"
           th:if="${loginTypesAvailable}"
           th:href="@{/profile/login-types}">Login types</a>
        <a class="profile-menu-item"
           th:if="${passwordChangeAvailable}"
           th:href="@{/profile/password}">Change password</a>
        <form method="post"
              th:action="@{/logout}"
              data-confirm-title="Log out?"
              data-confirm-action="Log out">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="profile-menu-item profile-menu-danger-item" type="submit">Logout</button>
        </form>
    </div>
</details>

<dialog class="confirmation-dialog" data-confirm-dialog th:fragment="confirmationDialog">
    <h2 class="section-title" data-confirm-dialog-title>Confirm action</h2>
    <div class="confirmation-actions">
        <form class="confirmation-cancel-form" method="dialog">
            <button class="button button-secondary" type="submit">Cancel</button>
        </form>
        <button class="button button-danger" type="button" data-confirm-dialog-submit>Confirm</button>
    </div>
</dialog>
</body>
</html>
