<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remember this browser</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<main class="panel">
    <h1 class="page-title">Remember this browser?</h1>
    <p class="page-subtitle">Stay signed in here for 6 months.</p>

    <form class="form" method="post" action="/remember-login">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="remember-me" value="true">
        <button class="button" type="submit">Remember this browser</button>
    </form>

    <form class="form secondary-form" method="post" action="/remember-login/skip">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="button button-secondary" type="submit">Not now</button>
    </form>
</main>
</body>
</html>
