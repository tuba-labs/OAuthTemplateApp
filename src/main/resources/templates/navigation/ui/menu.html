<div th:fragment="authenticatedMenu"
     class="app-navigation-shell app-navigation-shell-with-menu"
     data-navigation-shell>
    <header class="app-menu-bar">
        <nav class="app-breadcrumbs"
             th:if="${authenticatedNavigationMenu.hasBreadcrumbs()}"
             aria-label="Breadcrumb">
            <ol class="app-breadcrumb-list">
                <li class="app-breadcrumb-item"
                    th:each="breadcrumb : ${authenticatedNavigationMenu.breadcrumbs()}">
                    <a class="app-breadcrumb-link"
                       th:if="${!breadcrumb.active() and breadcrumb.hasRelativeUrl()}"
                       th:href="@{${breadcrumb.relativeUrl}}"
                       th:title="${breadcrumb.tooltip}"
                       th:text="${breadcrumb.label}">Page</a>
                    <span class="app-breadcrumb-current"
                          th:unless="${!breadcrumb.active() and breadcrumb.hasRelativeUrl()}"
                          th:attr="aria-current=${breadcrumb.active} ? 'page' : null"
                          th:title="${breadcrumb.tooltip}"
                          th:text="${breadcrumb.label}">Page</span>
                </li>
            </ol>
        </nav>
        <div class="page-controls app-menu-controls">
            <div th:replace="~{language/ui/language-selector :: selector}"></div>
            <button class="theme-toggle app-menu-theme-toggle"
                    type="button"
                    data-theme-toggle
                    aria-pressed="false"
                    th:attr="aria-label=#{theme.use-light},data-theme-use-light-label=#{theme.use-light},data-theme-use-dark-label=#{theme.use-dark}">
                <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                </span>
            </button>
        </div>
    </header>
    <aside class="app-section-nav"
           th:if="${authenticatedNavigationMenu.hasMenuItems()}"
           aria-label="Navigation"
           data-section-navigation>
        <div class="app-navigation-controls">
            <button class="app-navigation-menu-toggle"
                    type="button"
                    aria-controls="appNavigationTree"
                    aria-expanded="false"
                    aria-pressed="false"
                    data-navigation-menu-toggle
                    th:attr="aria-label=#{navigation.menu.open},data-navigation-open-label=#{navigation.menu.open},data-navigation-close-label=#{navigation.menu.close}">
                <span class="app-navigation-menu-toggle-lines" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>
            <form class="app-navigation-filter-form" role="search" data-navigation-filter-form>
                <label class="visually-hidden"
                       for="appNavigationFilter"
                       th:text="#{navigation.filter.label}"></label>
                <input id="appNavigationFilter"
                       class="app-navigation-filter"
                       type="search"
                       th:placeholder="#{navigation.filter.placeholder}"
                       autocomplete="off"
                       aria-controls="appNavigationTree"
                       data-navigation-filter>
            </form>
        </div>
        <nav id="appNavigationTree" class="app-navigation-tree" data-navigation-menu>
            <div th:replace="~{navigation/ui/menu :: navigationTree(${authenticatedNavigationMenu.primaryItems()})}"></div>
        </nav>
    </aside>
    <script th:src="@{/js/language-selector.js}" defer></script>
    <script th:src="@{/js/navigation-filter.js}" defer></script>
</div>

<ul class="app-menu-tree" th:fragment="navigationTree(items)">
    <li class="app-menu-tree-item" th:each="page : ${items}" data-navigation-menu-item>
        <a class="app-menu-link"
           th:classappend="${page.active} ? ' app-menu-link-active' : ''"
           th:if="${page.hasRelativeUrl()}"
           th:href="@{${page.relativeUrl}}"
           th:title="${page.tooltip}"
           th:attr="aria-current=${page.active} ? 'page' : null"
           data-navigation-menu-label
           th:text="${page.label}">Page</a>
        <span class="app-menu-link app-menu-branch-label"
              th:classappend="${page.active} ? ' app-menu-link-active' : ''"
              th:unless="${page.hasRelativeUrl()}"
              th:title="${page.tooltip}"
              data-navigation-menu-label
              th:text="${page.label}">Page</span>
        <div th:if="${page.hasChildren()}"
             th:replace="~{navigation/ui/menu :: navigationTree(${page.children})}"></div>
    </li>
</ul>
