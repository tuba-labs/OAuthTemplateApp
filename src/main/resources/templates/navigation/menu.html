<header th:fragment="authenticatedMenu" class="app-menu-bar">
    <details class="app-menu" th:if="${authenticatedNavigationMenu.hasSectionNavigation()}">
        <summary class="app-menu-toggle" aria-label="Toggle navigation">
            <span class="app-menu-icon" aria-hidden="true"></span>
        </summary>
        <nav class="app-menu-panel" th:attr="aria-label=${authenticatedNavigationMenu.sectionLabel()}">
            <h2 class="app-menu-section-title" th:text="${authenticatedNavigationMenu.sectionLabel()}">Section</h2>
            <div th:replace="~{navigation/menu :: navigationTree(${authenticatedNavigationMenu.sectionItems()})}"></div>
        </nav>
    </details>
    <nav class="app-primary-nav" aria-label="Main navigation">
        <th:block th:each="page : ${authenticatedNavigationMenu.primaryItems}">
            <a class="app-primary-nav-link"
               th:classappend="${page.active} ? ' app-primary-nav-link-active' : ''"
               th:if="${page.hasRelativeUrl()}"
               th:href="@{${page.relativeUrl}}"
               th:title="${page.tooltip}"
               th:attr="aria-current=${page.active} ? 'page' : null"
               th:text="${page.label}">Page</a>
            <span class="app-primary-nav-link app-primary-nav-branch-label"
                  th:classappend="${page.active} ? ' app-primary-nav-link-active' : ''"
                  th:unless="${page.hasRelativeUrl()}"
                  th:title="${page.tooltip}"
                  th:text="${page.label}">Page</span>
        </th:block>
    </nav>
    <button class="theme-toggle app-menu-theme-toggle" type="button" data-theme-toggle aria-pressed="false" aria-label="Use light theme">
        <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
        </span>
    </button>
</header>

<ul class="app-menu-tree" th:fragment="navigationTree(items)">
    <li class="app-menu-tree-item" th:each="page : ${items}">
        <a class="app-menu-link"
           th:classappend="${page.active} ? ' app-menu-link-active' : ''"
           th:if="${page.hasRelativeUrl()}"
           th:href="@{${page.relativeUrl}}"
           th:title="${page.tooltip}"
           th:attr="aria-current=${page.active} ? 'page' : null"
           th:text="${page.label}">Page</a>
        <span class="app-menu-link app-menu-branch-label"
              th:classappend="${page.active} ? ' app-menu-link-active' : ''"
              th:unless="${page.hasRelativeUrl()}"
              th:title="${page.tooltip}"
              th:text="${page.label}">Page</span>
        <div th:if="${page.hasChildren()}"
             th:replace="~{navigation/menu :: navigationTree(${page.children})}"></div>
    </li>
</ul>
