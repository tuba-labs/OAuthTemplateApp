<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{registration.title}">Register</title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/language-selector.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<main class="panel">
    <div class="panel-header">
        <div>
            <h1 class="page-title" th:text="#{registration.heading}">Create account</h1>
            <p class="page-subtitle" th:text="#{registration.subtitle}">Create a local email and password account.</p>
        </div>
        <div class="page-controls">
            <div th:replace="~{language/ui/language-selector :: selector}"></div>
            <button class="theme-toggle"
                    type="button"
                    data-theme-toggle
                    aria-pressed="false"
                    th:attr="aria-label=#{theme.use-light},data-theme-use-light-label=#{theme.use-light},data-theme-use-dark-label=#{theme.use-dark}">
                <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                </span>
            </button>
        </div>
    </div>
    <p class="message message-error" th:if="${registrationError}" th:text="${registrationError}"></p>

    <form class="form" method="post" action="/register">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label class="field">
            <span th:text="#{registration.email.label}">Email</span>
            <input name="email" type="email" autocomplete="email" required maxlength="320">
        </label>
        <label class="field">
            <span th:text="#{registration.password.label}">Password</span>
            <input name="password"
                   type="password"
                   autocomplete="new-password"
                   required
                   minlength="8"
                   maxlength="128"
                   pattern="(?=.*[A-Za-z])(?=.*(?:[0-9]|[^\w\s])).{8,128}"
                   th:title="#{registration.password.requirements-title}"
                   aria-describedby="passwordRequirements">
            <p class="field-help" id="passwordRequirements" th:text="#{registration.password.requirements}">
                Use 8 to 128 characters with at least one letter and one number or symbol.
                It will also be checked against known breached passwords when you submit.
            </p>
        </label>
        <label class="field">
            <span th:text="#{registration.password-confirmation.label}">Confirm password</span>
            <input name="passwordConfirmation"
                   type="password"
                   autocomplete="new-password"
                   required
                   minlength="8"
                   maxlength="128">
        </label>
        <button class="button" type="submit" th:text="#{registration.action.create-account}">Create account</button>
    </form>

    <div class="links">
        <a href="/login" th:text="#{registration.action.back-to-login}">Back to sign in</a>
    </div>
</main>
</body>
</html>
