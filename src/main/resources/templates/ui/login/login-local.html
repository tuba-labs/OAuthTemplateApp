<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{login.local.title}">Email and password sign in</title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/language-selector.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<main class="panel">
    <div class="panel-header">
        <div>
            <h1 class="page-title" th:text="#{login.local.heading}">Email and password</h1>
            <p class="page-subtitle" th:text="#{login.local.subtitle}">Sign in with your local account.</p>
        </div>
        <div class="page-controls">
            <div th:replace="~{language/ui/language-selector :: selector}"></div>
            <button class="theme-toggle"
                    type="button"
                    data-theme-toggle
                    aria-pressed="false"
                    th:attr="aria-label=#{theme.use-light},data-theme-use-light-label=#{theme.use-light},data-theme-use-dark-label=#{theme.use-dark}">
                <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                </span>
            </button>
        </div>
    </div>
    <p class="message message-error" th:if="${hasLoginError}" th:text="#{login.local.error.invalid-credentials}"></p>
    <p class="message message-success" th:if="${registrationComplete}" th:text="#{login.local.message.registration-complete}"></p>

    <form class="form" method="post" action="/login/local">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label class="field">
            <span th:text="#{login.local.email.label}">Email</span>
            <input name="email" type="email" autocomplete="email" required maxlength="320">
        </label>
        <label class="field">
            <span th:text="#{login.local.password.label}">Password</span>
            <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button" type="submit" th:text="#{login.local.action.sign-in}">Sign in</button>
    </form>

    <div class="links">
        <a href="/register" th:text="#{login.local.action.create-account}">Create account</a>
        <a href="/login" th:text="#{login.local.action.other-method}">Use another sign in method</a>
    </div>
</main>
</body>
</html>
