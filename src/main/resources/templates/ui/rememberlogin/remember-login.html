<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{remember-login.title}"></title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/language-selector.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<main class="panel">
    <div class="panel-header">
        <div>
            <h1 class="page-title" th:text="#{remember-login.heading}"></h1>
            <p class="page-subtitle" th:text="#{remember-login.subtitle}"></p>
        </div>
        <div class="page-controls">
            <div th:replace="~{language/ui/language-selector :: selector}"></div>
            <button class="theme-toggle"
                    type="button"
                    data-theme-toggle
                    aria-pressed="false"
                    th:attr="aria-label=#{theme.use-light},data-theme-use-light-label=#{theme.use-light},data-theme-use-dark-label=#{theme.use-dark}">
                <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                </span>
            </button>
        </div>
    </div>
    <form class="form" method="post" action="/remember-login">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="remember-me" value="true">
        <button class="button" type="submit" th:text="#{remember-login.action.remember}"></button>
    </form>

    <form class="form secondary-form" method="post" action="/remember-login/skip">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="button button-secondary" type="submit" th:text="#{remember-login.action.skip}"></button>
    </form>
</main>
</body>
</html>
