<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile</title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/profile-picture.js}"></script>
    <script th:src="@{/js/profile-actions.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{navigation/ui/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <h1 class="page-title" th:text="${#strings.isEmpty(profileForm.displayName) ? 'Profile' : profileForm.displayName}">Profile</h1>
        <form class="profile-logout-link-form"
              method="post"
              th:action="@{/logout}"
              data-confirm-title="Log out?"
              data-confirm-action="Log out">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="profile-logout-link" type="submit">Logout</button>
        </form>
    </div>
    <p class="page-subtitle">Manage the information shown for your account.</p>
    <p class="message message-success" th:if="${profileSaved}">Profile saved.</p>
    <p class="message message-success" th:if="${passwordSaved}">Password changed.</p>

    <form id="profileForm" class="form" method="post" action="/profile" enctype="multipart/form-data" th:object="${profileForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field" th:if="${localProfile}">
            <span>Login name</span>
            <output class="readonly-value" th:text="${localLoginName}">person@example.com</output>
        </div>

        <div class="profile-identity-field">
            <label class="profile-picture-field">
                <span class="visually-hidden">Profile picture</span>
                <span class="profile-picture-control" data-profile-picture-control>
                    <img class="profile-picture-image"
                         th:if="${profilePictureUrl}"
                         th:src="${profilePictureUrl}"
                         alt=""
                         data-profile-picture-preview>
                    <span class="profile-picture-placeholder"
                          th:unless="${profilePictureUrl}"
                          data-profile-picture-placeholder>Profile</span>
                    <input class="profile-picture-input"
                           name="pictureFile"
                           type="file"
                           accept="image/png,image/jpeg,image/gif"
                           data-profile-picture-input>
                </span>
                <span class="field-error" th:if="${#fields.hasErrors('pictureUrl')}" th:errors="*{pictureUrl}"></span>
            </label>
            <label class="field profile-display-name-field">
                <span>Display name</span>
                <input th:field="*{displayName}" autocomplete="name" required minlength="3" maxlength="20" aria-describedby="displayNameRequirements">
                <p class="field-help" id="displayNameRequirements">Use 3 to 20 characters.</p>
                <span class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></span>
            </label>
        </div>
    </form>

    <div class="profile-actions">
        <button class="button" type="submit" form="profileForm">Save profile</button>
    </div>

    <div th:replace="~{ui/profile/fragments/profile-fragments :: confirmationDialog}"></div>
</section>
</main>
</body>
</html>
