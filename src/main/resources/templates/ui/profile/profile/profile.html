<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{navigation.page.profile.label}"></title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:if="${backgroundAnimationEnabled}" th:src="@{/js/ambient-dots.js}" defer></script>
    <script th:src="@{/js/navigation-state.js}"></script>
    <script th:src="@{/js/profile-picture.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{navigation/ui/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <h1 class="page-title"
            th:text="${#strings.isEmpty(profileForm.displayName) ? #messages.msg('navigation.page.profile.label') : profileForm.displayName}"></h1>
    </div>
    <p class="page-subtitle" th:text="#{profile.subtitle}"></p>
    <p class="message message-success" th:if="${profileSaved}" th:text="#{profile.message.saved}"></p>
    <p class="message message-success" th:if="${passwordSaved}" th:text="#{profile.change-password.message.saved}"></p>

    <form id="profileForm" class="form" method="post" th:action="@{/profile}" enctype="multipart/form-data" th:object="${profileForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field" th:if="${localProfile}">
            <span th:text="#{profile.login-name.label}"></span>
            <output class="readonly-value" th:text="${localLoginName}"></output>
        </div>

        <div class="profile-identity-field">
            <label class="profile-picture-field">
                <span class="visually-hidden" th:text="#{profile.picture.label}"></span>
                <span class="profile-picture-control" data-profile-picture-control>
                    <img class="profile-picture-image"
                         th:if="${profilePictureUrl}"
                         th:src="${profilePictureUrl}"
                         alt=""
                         data-profile-picture-preview>
                    <span class="profile-picture-placeholder"
                          th:unless="${profilePictureUrl}"
                          data-profile-picture-placeholder
                          th:text="#{navigation.page.profile.label}"></span>
                    <input class="profile-picture-input"
                           name="pictureFile"
                           type="file"
                           accept="image/png,image/jpeg,image/gif"
                           data-profile-picture-input>
                </span>
                <span class="field-error" th:if="${#fields.hasErrors('pictureUrl')}" th:errors="*{pictureUrl}"></span>
            </label>
            <label class="field profile-display-name-field">
                <span th:text="#{profile.display-name.label}"></span>
                <input th:field="*{displayName}" autocomplete="name" required minlength="3" maxlength="20" aria-describedby="displayNameRequirements">
                <p class="field-help" id="displayNameRequirements" th:text="#{profile.display-name.help}"></p>
                <span class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></span>
            </label>
        </div>

        <label class="field">
            <span th:text="#{profile.language.label}"></span>
            <select th:field="*{languageTag}" required>
                <option th:each="option : ${languageOptions}"
                        th:value="${option.languageTag}"
                        th:text="${option.displayLabel()}"></option>
            </select>
            <span class="field-error" th:if="${#fields.hasErrors('languageTag')}" th:errors="*{languageTag}"></span>
        </label>

        <label class="checkbox-field">
            <input type="checkbox" th:field="*{disableBackgroundAnimation}">
            <span th:text="#{profile.background-animation.disable.label}"></span>
        </label>
    </form>

    <div class="profile-actions">
        <button class="button" type="submit" form="profileForm" th:text="#{profile.action.save}"></button>
    </div>
</section>
</main>
</body>
</html>
