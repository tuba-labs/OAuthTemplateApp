<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change password</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{navigation/ui/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <h1 class="page-title">Change password</h1>
    </div>
    <p class="page-subtitle">Update the password for your email login.</p>

    <form class="form"
          method="post"
          th:action="@{/profile/password}"
          th:object="${passwordForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="field">
            <span>Current password</span>
            <input name="currentPassword" type="password" autocomplete="current-password" required>
            <span class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
        </label>
        <label class="field">
            <span>New password</span>
            <input name="newPassword" type="password" autocomplete="new-password" required>
            <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
        </label>
        <label class="field">
            <span>Confirm new password</span>
            <input name="newPasswordConfirmation" type="password" autocomplete="new-password" required>
            <span class="field-error" th:if="${#fields.hasErrors('newPasswordConfirmation')}" th:errors="*{newPasswordConfirmation}"></span>
        </label>
        <div class="button-row">
            <a class="button button-secondary" th:href="@{/profile}">Back</a>
            <button class="button" type="submit">Save password</button>
        </div>
    </form>
</section>
</main>
</body>
</html>
