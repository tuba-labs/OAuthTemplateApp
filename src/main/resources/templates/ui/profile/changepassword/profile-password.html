<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{navigation.page.profile.change-password.label}"></title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:if="${backgroundAnimationEnabled}" th:src="@{/js/ambient-dots.js}" defer></script>
    <script th:src="@{/js/navigation-state.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{navigation/ui/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <h1 class="page-title" th:text="#{navigation.page.profile.change-password.label}"></h1>
    </div>
    <p class="page-subtitle" th:text="#{profile.change-password.subtitle}"></p>
    <p class="message message-error" th:if="${passwordErrorMessage}" th:text="${passwordErrorMessage}"></p>

    <form class="form"
          method="post"
          th:action="@{/profile/password}"
          th:object="${passwordForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="field">
            <span th:text="#{profile.change-password.current-password.label}"></span>
            <input name="currentPassword" type="password" autocomplete="current-password" required>
        </label>
        <label class="field">
            <span th:text="#{profile.change-password.new-password.label}"></span>
            <input name="newPassword" type="password" autocomplete="new-password" required>
        </label>
        <label class="field">
            <span th:text="#{profile.change-password.new-password-confirmation.label}"></span>
            <input name="newPasswordConfirmation" type="password" autocomplete="new-password" required>
        </label>
        <div class="button-row">
            <a class="button button-secondary" th:href="@{/profile}" th:text="#{profile.action.back}"></a>
            <button class="button" type="submit" th:text="#{profile.change-password.action.save}"></button>
        </div>
    </form>
</section>
</main>
</body>
</html>
