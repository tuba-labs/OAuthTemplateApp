<!doctype html>
<html lang="en" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{navigation.page.profile.login-types.label}"></title>
    <script th:src="@{/js/theme.js}"></script>
    <script th:if="${backgroundAnimationEnabled}" th:src="@{/js/ambient-dots.js}" defer></script>
    <script th:src="@{/js/navigation-state.js}"></script>
    <script th:src="@{/js/profile-actions.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-page">
<div th:replace="~{navigation/ui/menu :: authenticatedMenu}"></div>
<main class="app-content">
<section class="panel panel-wide">
    <div class="profile-title-row">
        <h1 class="page-title" th:text="#{navigation.page.profile.login-types.label}"></h1>
    </div>
    <p class="page-subtitle" th:text="#{profile.login-types.subtitle}"></p>
    <p class="message message-success" th:if="${loginTypeLinkedMessage}" th:text="${loginTypeLinkedMessage}"></p>
    <p class="message message-error" th:if="${loginTypeErrorMessage}" th:text="${loginTypeErrorMessage}"></p>

    <div class="login-type-list" th:if="${localLoginTypeAvailable or !#lists.isEmpty(loginTypeOptions)}">
        <div class="login-type-row" th:if="${localLoginTypeAvailable}">
            <span class="login-type-name" th:text="#{profile.login-types.local.label}"></span>
            <div class="login-type-actions">
                <a class="button button-secondary login-type-action-button"
                   th:href="@{/profile/login-types/local/link}"
                   th:text="#{profile.login-types.action.link}"></a>
            </div>
        </div>
        <div class="login-type-row" th:each="option : ${loginTypeOptions}">
            <span class="login-type-name" th:text="${option.label}"></span>
            <div class="login-type-actions">
                <form class="login-type-action-form"
                      method="post"
                      th:action="@{/profile/login-types/{providerId}/link(providerId=${option.providerId})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button button-secondary login-type-action-button"
                            type="submit"
                            th:text="#{profile.login-types.action.link}"></button>
                </form>
            </div>
        </div>
    </div>

    <div class="login-type-list secondary-form" th:if="${!#lists.isEmpty(linkedLoginTypeOptions)}">
        <div class="login-type-row"
             th:each="option : ${linkedLoginTypeOptions}"
             th:with="loginTypeLabel=${option.localLoginType ? #messages.msg('profile.login-types.local.label') : option.label}">
            <span class="login-type-name" th:text="${loginTypeLabel}"></span>
            <div class="login-type-actions">
                <a class="button button-secondary login-type-action-button"
                   th:if="${option.passwordChangeAvailable}"
                   th:href="@{/profile/password}"
                   th:text="#{navigation.page.profile.change-password.label}"></a>
                <form class="login-type-action-form"
                      th:if="${option.current}"
                      method="post"
                      th:action="@{/logout}"
                      th:attr="data-confirm-title=#{profile.action.logout.confirm-title},data-confirm-action=#{profile.action.logout.confirm-action}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button button-danger login-type-action-button"
                            type="submit"
                            th:text="#{profile.action.logout}"></button>
                </form>
                <form class="login-type-action-form"
                      th:if="${!option.current and option.unlinkAvailable}"
                      method="post"
                      th:action="@{/profile/login-types/{providerId}/unlink(providerId=${option.providerId})}"
                      th:attr="data-confirm-title=#{profile.login-types.confirm.unlink-title(${loginTypeLabel})},data-confirm-action=#{profile.login-types.action.unlink}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button button-danger login-type-action-button"
                            type="submit"
                            th:text="#{profile.login-types.action.unlink}"></button>
                </form>
                <span class="field-help login-type-status"
                      th:if="${!option.current and !option.unlinkAvailable}"
                      th:text="${option.status}"></span>
            </div>
        </div>
    </div>

    <div th:replace="~{ui/profile/fragments/profile-fragments :: confirmationDialog}"></div>
</section>
</main>
</body>
</html>
