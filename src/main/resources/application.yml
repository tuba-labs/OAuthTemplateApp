applicationName: OauthTemplateApp
local-config-override-folder: ${user.home}/apps/${applicationName}
spring:
  application:
    name: ${applicationName}
  config:
    import:
      - classpath:config/security/GoogleOauth2.yml
      - classpath:config/security/GithubOauth2.yml
      - classpath:config/db/hikari.yml
      - classpath:config/monitoring/actuator.yml
      - optional:file:${local-config-override-folder}/secrets.properties
      - optional:file:${local-config-override-folder}/env_overrides.properties

app:
  profile:
    pictures:
      storage-dir: ${PROFILE_PICTURE_STORAGE_DIR:${user.home}/apps/${applicationName}/profile-pictures}
      max-bytes: ${PROFILE_PICTURE_MAX_BYTES:5242880}
      target-size-pixels: ${PROFILE_PICTURE_TARGET_SIZE_PIXELS:600}
      thumbnail-size-pixels: ${PROFILE_PICTURE_THUMBNAIL_SIZE_PIXELS:100}
      max-width-pixels: ${PROFILE_PICTURE_MAX_WIDTH_PIXELS:4096}
      max-height-pixels: ${PROFILE_PICTURE_MAX_HEIGHT_PIXELS:4096}
  security:
    remember-login:
      prompt-skip-duration: ${REMEMBER_LOGIN_PROMPT_SKIP_DURATION:30d}
    remember-me:
      token-validity: ${REMEMBER_ME_TOKEN_VALIDITY:183d}
      key: ${REMEMBER_ME_KEY:oauth-template-app-local-remember-me-key-change-before-production}
    password:
      pwned-passwords:
        enabled: true
        base-url: https://api.pwnedpasswords.com

